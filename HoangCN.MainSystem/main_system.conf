# =========================================================================
# Cấu hình Nginx tiêu chuẩn cho API HoangCN.MainSystem
# Đường dẫn trên VPS: /etc/nginx/sites-available/main_system.conf
# Kích hoạt bằng cách link sang: /etc/nginx/sites-enabled/
# =========================================================================

# 1. Chuyển hướng HTTP sang HTTPS tự động
server {
    listen 80;
    listen [::]:80;
    server_name api.hoangcn.com; # Thay thế bằng tên miền API thực tế của bạn

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Cấu hình Server HTTPS chính
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.hoangcn.com; # Thay thế bằng tên miền API thực tế của bạn

    # Cấu hình SSL Certificates (Tự sinh bằng Certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.hoangcn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hoangcn.com/privkey.pem;

    # Cấu hình tối ưu hóa bảo mật SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Giới hạn dung lượng tối đa của file tải lên (Ví dụ: Cho phép upload file 50MB)
    client_max_body_size 50M;

    # Cấu hình Header Bảo mật
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Log file ghi nhận lịch sử truy cập và lỗi
    access_log /var/log/nginx/hoangcn_api_access.log;
    error_log /var/log/nginx/hoangcn_api_error.log warn;

    # 3. Định tuyến chuyển hướng Request về Container .NET (Port 5006)
    location / {
        proxy_pass http://127.0.0.1:5006; # Trỏ về cổng 5006 của Docker đã map ra VPS
        proxy_http_version 1.1;

        # Cấu hình Header chuyển tiếp (Forward Headers) để .NET nhận diện đúng Client IP và Scheme (HTTP/HTTPS)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # Cấu hình Timeout chống treo kết nối
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        # Cho phép truyền Cookie an toàn trên HTTPS
        proxy_cookie_path / "/; Secure; HttpOnly; SameSite=Lax";
    }
}
