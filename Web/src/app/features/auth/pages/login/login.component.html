<div class="login-container">
  <div class="login-wrapper">
    <nz-card class="login-card">
      <!-- Logo & Title -->
      <div class="login-header">
        <div class="logo">
          <img src="assets/images/logo.png" width="90" height="90" alt="HoangCN" class="object-fit-cover"/>
        </div>
        <h1>Đăng nhập</h1>
        <p class="subtitle">Chào mừng bạn quay trở lại!</p>
      </div>

      <!-- Login Form -->
      <form nz-form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" nzLayout="vertical">
        
        <!-- Email Field -->
        <nz-form-item>
          <nz-form-control nzErrorTip="Vui lòng nhập email hợp lệ!">
            <nz-input-group nzPrefixIcon="mail" nzSize="large">
              <input
                type="email"
                nz-input
                id="email"
                formControlName="email"
                placeholder="example@email.com"
              />
            </nz-input-group>
          </nz-form-control>
        </nz-form-item>

        <!-- Password Field -->
        <nz-form-item>
          <nz-form-control nzErrorTip="Mật khẩu phải có ít nhất 6 ký tự!">
            <nz-input-group [nzSuffix]="suffixTemplate" nzPrefixIcon="lock" nzSize="large">
              <input
                [type]="passwordVisible ? 'text' : 'password'"
                nz-input
                id="password"
                formControlName="password"
                placeholder="Nhập mật khẩu"
              />
            </nz-input-group>
            <ng-template #suffixTemplate>
              <span
                nz-icon
                [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"
                (click)="togglePasswordVisibility()"
                class="password-toggle"
              ></span>
            </ng-template>
          </nz-form-control>
        </nz-form-item>

        <!-- Submit Button -->
        <nz-form-item>
          <nz-form-control>
            <button
              nz-button
              nzType="primary"
              nzBlock
              [nzSize]="'large'"
              [nzLoading]="authService.isLoading()"
              type="submit"
            >
              Đăng nhập
            </button>
          </nz-form-control>
        </nz-form-item>
      </form>

      <!-- Divider -->
      <nz-divider nzText="Hoặc" class="mb-1"></nz-divider>

      <!-- Google Login -->
      <button
        nz-button
        nzBlock
        [nzSize]="'large'"
        class="google-login-btn"
        [nzLoading]="authService.isLoading()"
        (click)="loginWithGoogle()"
      >
        <span nz-icon nzType="google" nzTheme="outline"></span><span>Đăng nhập với Google</span>
      </button>
    </nz-card>
  </div>
</div>
