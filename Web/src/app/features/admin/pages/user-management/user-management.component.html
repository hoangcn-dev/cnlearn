<div class="">
    <h5 class="fw-light">Danh sách người dùng</h5>
    <div class="d-flex mb-2">
        <input nz-input placeholder="" class="w-auto me-2" />
        <button nz-button nzType="default" nzShape="circle" class="me-2"><nz-icon nzType="search" /></button>
        <button nz-button nzType="default" nzShape="circle" class="me-2"><nz-icon nzType="reload" /></button>
        <div class="flex-fill"></div>
        <button nz-button><nz-icon nzType="plus" /> Thêm tài khoản quản lý</button>
    </div>
    <nz-table #rowSelectionTable nzShowSizeChanger [nzData]="listOfData" class="border border-1 pe-2"
        (nzCurrentPageDataChange)="onCurrentPageDataChange($event)">
        <thead>
            <tr>
                <th [nzSelections]="listOfSelection" [(nzChecked)]="checked" [nzIndeterminate]="indeterminate"
                    (nzCheckedChange)="onAllChecked($event)"></th>
                <th>Name</th>
                <th>Age</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody>
            @for (data of rowSelectionTable.data; track data) {
            <tr>
                <td [nzChecked]="setOfCheckedId.has(data.id)" (nzCheckedChange)="onItemChecked(data.id, $event)"></td>
                <td>{{ data.name }}</td>
                <td>{{ data.age }}</td>
                <td>{{ data.address }}</td>
            </tr>
            }
        </tbody>
    </nz-table>
</div>
